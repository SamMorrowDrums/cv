name: Regenerate OG images and RSS

on:
  push:
    branches: [main]
    paths:
      - '_blog/**'
      - 'public/images/**'
      - 'scripts/generate-og-images.mjs'
      - 'scripts/generate-rss.mjs'
      - 'lib/api.js'
      - 'lib/seo.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - run: npm ci

      - name: Regenerate OG images
        run: npm run generate-og-images

      - name: Regenerate RSS
        run: npm run generate-rss

      - name: Commit if dirty
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/og-images public/rss.xml 2>/dev/null)" ]; then
            git add public/og-images public/rss.xml
            git commit -m "chore: regenerate OG images and RSS

            Auto-generated by .github/workflows/regenerate-assets.yml"
            git push
            echo "Committed regenerated assets"
          else
            echo "No changes to commit"
          fi
